name: "Kcal Balance"
version: "2.3.1"
slug: "kcal_balance"
description: "Calorie balance tracker with web dashboard — FatSecret + Garmin for two users"
url: "https://github.com/turpela/ha-kcal-balance"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
homeassistant_api: true
ingress: true
ingress_port: 8080
ingress_entry: /
panel_icon: mdi:scale-balance
panel_title: Kcal Balance
options:
  u1_consumer_key: ""
  u1_consumer_secret: ""
  u1_access_token: ""
  u1_access_token_secret: ""
  u1_garmin_entity: ""
  u2_consumer_key: ""
  u2_consumer_secret: ""
  u2_access_token: ""
  u2_access_token_secret: ""
  u2_garmin_entity: ""
  scan_interval: 300
schema:
  u1_consumer_key: str
  u1_consumer_secret: password
  u1_access_token: str
  u1_access_token_secret: password
  u1_garmin_entity: str?
  u2_consumer_key: str?
  u2_consumer_secret: password?
  u2_access_token: str?
  u2_access_token_secret: password?
  u2_garmin_entity: str?
  scan_interval: int
