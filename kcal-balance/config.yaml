name: "Kcal Balance"
version: "1.4.3"
slug: "kcal_balance"
description: "Daily calorie balance tracker — FatSecret food diary for two users"
url: "https://github.com/turpela/ha-kcal-balance"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
homeassistant_api: true
options:
  u1_consumer_key: ""
  u1_consumer_secret: ""
  u1_access_token: ""
  u1_access_token_secret: ""
  u1_goal_mode: "maintenance"
  u1_goal_kcal: 0
  u1_goal_offset: 0
  u1_garmin_entity: ""
  u2_consumer_key: ""
  u2_consumer_secret: ""
  u2_access_token: ""
  u2_access_token_secret: ""
  u2_goal_mode: ""
  u2_goal_kcal: 0
  u2_goal_offset: 0
  u2_garmin_entity: ""
  scan_interval: 300
schema:
  u1_consumer_key: str
  u1_consumer_secret: password
  u1_access_token: str
  u1_access_token_secret: password
  u1_goal_mode: "list(weight_loss|maintenance|muscle_gain)"
  u1_goal_kcal: int?
  u1_goal_offset: int?
  u1_garmin_entity: str?
  u2_consumer_key: str?
  u2_consumer_secret: password?
  u2_access_token: str?
  u2_access_token_secret: password?
  u2_goal_mode: str?
  u2_goal_kcal: int?
  u2_goal_offset: int?
  u2_garmin_entity: str?
  scan_interval: int
